<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movie Sessions</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f8f9fa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table th, table td {
            padding: 12px;
            text-align: left;
            border: 1px solid #dee2e6;
        }

        table th {
            background-color: #007bff;
            color: white;
        }

        table tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .add-to-cart-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            font-size: 14px;
        }

        .add-to-cart-btn:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments :: header}"></div>

<h1>Movie Sessions</h1>

<table>
    <thead>
    <tr>
        <th>Movie</th>
        <th>Cinema Hall</th>
        <th>Show Date and Time</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <!-- Loop through the movieSessions list -->
    <tr th:each="movieSession : ${movieSessions}">
        <td th:text="${movieSession.movie.title}"></td>
        <td th:text="${movieSession.cinemaHall.description}"></td>
        <!-- Format LocalDateTime to a readable format -->
        <td th:text="${movieSession.showTime}"></td>
        <td>
            <form th:action="@{/movie-sessions/{id}/seats(id=${movieSession.id})}" method="get">
                <button type="submit" class="choose-seat-btn">Choose seat</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
