<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Free Seats</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #f4f6f8;
            margin: 0; padding: 20px;
        }

        h1 {
            color: #333;
        }

        .seating-chart {
            display: inline-block;
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .row {
            display: flex;
            margin-bottom: 8px;
            justify-content: center;
            align-items: center;
        }

        .row span:first-child {
            width: 60px; /* Fixed width for row numbers */
            text-align: right;
            margin-right: 10px;
            font-weight: bold;
            color: #555;
        }

        .seat {
            width: 34px;
            height: 34px;
            margin: 3px;
            border: 1.5px solid #ccc;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: 600;
            user-select: none;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .seat.free {
            background-color: #90EE90; /* Light Green for Free Seats */
            border-color: #4CAF50;
        }

        .seat.occupied {
            background-color: #FF6347; /* Tomato Red for Occupied Seats */
            cursor: not-allowed;
            color: #fff;
        }

        .seat.selected {
            background-color: #FFD700; /* Gold for Selected Seats */
            border-color: #daa520;
        }

        .seat.free:hover {
            background-color: #32CD32; /* Darker green on hover */
            border-color: #228B22;
        }

        #select-seats-btn {
            margin-top: 25px;
            padding: 12px 28px;
            font-size: 18px;
            background-color: #2196F3; /* Blue */
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        #select-seats-btn:hover {
            background-color: #0b7dda;
        }

        /* Modal styles */
        #confirm-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #confirm-modal .modal-content {
            background: white;
            padding: 25px 30px;
            border-radius: 10px;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #confirm-modal p {
            font-size: 18px;
            margin-bottom: 25px;
            color: #333;
        }

        #confirm-modal button {
            margin: 0 10px;
            padding: 10px 22px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            font-weight: 600;
        }

        #confirm-buy-btn {
            background-color: #4CAF50; /* Green */
            color: white;
        }

        #confirm-buy-btn:hover {
            background-color: #449d48;
        }

        #cancel-btn {
            background-color: #f44336; /* Red */
            color: white;
        }

        #cancel-btn:hover {
            background-color: #d1362a;
        }
    </style>
</head>
<body>
<h1>Choose Your Seat</h1>

<div class="seating-chart">
    <div th:each="row, rowStat : ${seatMatrix}">
        <div class="row">
            <span th:text="'Row ' + (${rowStat.index} + 1)"></span>
            <div th:each="seat, seatStat : ${row}"
                 th:class="'seat ' + (${seat} ? 'occupied' : 'free')"
                 th:attr="data-row=${rowStat.index + 1}, data-seat=${seatStat.index + 1}">
                <span th:text="${seatStat.index + 1}"></span>
            </div>
        </div>
    </div>
</div>

<button id="select-seats-btn">Select Seats</button>

<!-- Modal -->
<div id="confirm-modal">
    <div class="modal-content">
        <p>Confirm and buy tickets?</p>
        <button id="confirm-buy-btn">Buy</button>
        <button id="cancel-btn">Cancel</button>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const freeSeats = document.querySelectorAll(".seat.free");
        const selectSeatsBtn = document.getElementById("select-seats-btn");
        const confirmModal = document.getElementById("confirm-modal");
        const confirmBuyBtn = document.getElementById("confirm-buy-btn");
        const cancelBtn = document.getElementById("cancel-btn");
        const selectedSeats = [];

        // Extract movie session ID from the URL
        const urlParts = window.location.pathname.split("/");
        const movieSessionId = urlParts[urlParts.indexOf("movie-sessions") + 1];

        freeSeats.forEach(seat => {
            seat.addEventListener("click", () => {
                const row = seat.getAttribute("data-row");
                const seatNumber = seat.getAttribute("data-seat");

                if (seat.classList.contains("selected")) {
                    seat.classList.remove("selected");
                    const index = selectedSeats.indexOf(`${row}-${seatNumber}`);
                    if (index > -1) selectedSeats.splice(index, 1);
                } else {
                    seat.classList.add("selected");
                    selectedSeats.push(`${row}-${seatNumber}`);
                }
            });
        });

        selectSeatsBtn.addEventListener("click", () => {
            if (selectedSeats.length === 0) {
                alert("No seats selected!");
                return;
            }
            confirmModal.style.display = "flex";
        });

        cancelBtn.addEventListener("click", () => {
            confirmModal.style.display = "none";
        });

        confirmBuyBtn.addEventListener("click", () => {
            confirmBuyBtn.disabled = true;
            fetch(`/movie-sessions/${movieSessionId}/confirm-seats`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ seats: selectedSeats })
            })
            .then(response => {
                if (response.ok) {
                    window.location.href = '/tickets';
                } else {
                    alert("Error confirming seats. Please try again.");
                    confirmBuyBtn.disabled = false;
                }
            })
            .catch(error => {
                console.error("Error:", error);
                alert("An error occurred. Please try again.");
                confirmBuyBtn.disabled = false;
            });
        });
    });
</script>
</body>
</html>
