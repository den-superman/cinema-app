<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Available Movies</title>
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background-color: #f7f8fc;
            margin: 0;
            padding: 0;
        }

        main {
            padding: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 2rem;
        }

        .movie-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .movie-item {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .movie-info {
            margin-bottom: 1rem;
        }

        .movie-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 0.5rem;
        }

        .movie-description {
            font-size: 0.95rem;
            color: #6c7a89;
        }

        .movie-actions {
            text-align: right;
            display: flex;
            justify-content: space-between;
            gap: 0.5rem;
        }

        .book {
            background-color: #3498db;
            color: white;
            padding: 0.6rem 1.2rem;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: background-color 0.3s ease;
        }

        .book:hover {
            background-color: #2980b9;
        }
        .comment-button {
            background-color: #2ecc71;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }

        .comment-button:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>
<div th:replace="fragments :: header"></div>

<main>
    <h1>🎬 Available Movies</h1>
    <ul class="movie-list">
        <li class="movie-item" th:each="movie : ${movies}">
            <div class="movie-info">
                <p class="movie-title" th:text="${movie.title}">Movie Title</p>
                <p class="movie-description" th:text="${movie.description}">Movie description goes here...</p>
            </div>
            <div class="movie-actions">
                <button class="book comment-button comments-toggle" type="button" th:attr="data-movie-id=${movie.id}">💬 Comments</button>
                <a class="book" th:href="@{/movie-sessions/available(movieId=${movie.id})}">Check Sessions</a>
            </div>
            <div class="comments-section" style="display: none;"></div>

        </li>
    </ul>
</main>

<script>
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.comments-toggle').forEach(button => {
        button.addEventListener('click', function () {
          const movieId = this.getAttribute('data-movie-id');
          const container = this.closest('li').querySelector('.comments-section');

          if (container.style.display === 'none') {
            fetch(`/movies/${movieId}/comments`)
              .then(response => {
                if (!response.ok) {
                  throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
              })
              .then(comments => {
                console.log('COMMENTS:', comments);
                container.innerHTML = `
                  <div class="comment-list">
                    ${comments.map(c => `
                      <div class="comment">
                        <strong>${c.userEmail}</strong>: ${c.text}
                      </div>
                    `).join('')}
                  </div>
                  <form class="comment-form">
                    <input
                      type="text"
                      name="text"
                      placeholder="Write a comment..."
                      required
                      style="width: 100%; padding: 0.5rem; margin-top: 0.5rem; border-radius: 6px; border: 1px solid #ccc;"
                    >
                    <button
                      type="submit"
                      style="margin-top: 0.5rem; padding: 0.5rem 1rem; border: none; background-color: #3498db; color: white; border-radius: 6px; cursor: pointer;"
                    >
                      Submit
                    </button>
                  </form>
                `;

                container.style.display = 'block';
                this.textContent = 'Hide Comments';

                const form = container.querySelector('.comment-form');
                form.addEventListener('submit', function (e) {
                  e.preventDefault();
                  const text = this.text.value.trim();
                  if (!text) return;

                  fetch(`/movies/${movieId}/comments`, {
                    method: 'POST',
                    headers: {
                    'Content-Type': 'text/plain'
                    },
                    body: text
                  })
                    .then(res => {
                      if (!res.ok) throw new Error(`Ошибка: ${res.status}`);
                      return res.json();
                    })
                    .then(newComment => {
                      const list = container.querySelector('.comment-list');
                      const div = document.createElement('div');
                      div.className = 'comment';
                      div.innerHTML = `<strong>${newComment.userEmail}</strong>: ${newComment.text}`;
                      list.appendChild(div);
                      form.reset();
                    })
                    .catch(err => {
                      console.error('Ошибка при добавлении комментария:', err);
                      alert('Не удалось отправить комментарий.');
                    });
                });
              })
              .catch(err => {
                console.error('FETCH ERROR:', err);
                container.innerHTML = '<p>Error loading comments.</p>';
                container.style.display = 'block';
              });
          } else {
            container.style.display = 'none';
            this.textContent = '💬 Comments';
          }
        });
      });
    });
</script>

</body>
</html>
