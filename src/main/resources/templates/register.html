<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
</head>
<body>
<h1>Register</h1>
<form action="#" th:action="@{/register}" th:object="${userRequestDto}" method="post">

    <label for="email">Email:</label>
    <input type="email" id="email" th:field="*{email}" required><br>

    <label for="password">Password:</label>
    <input type="password" id="password" th:field="*{password}" required><br>

    <label for="repeatPassword">Repeat password:</label>
    <input type="password" id="repeatPassword" th:field="*{repeatPassword}" required><br>

    <button type="submit">Register</button>
</form>
<div>
    <!-- Registration link/button -->
    <a href="/login">Back to login</a>
</div>
</body>
</html>
